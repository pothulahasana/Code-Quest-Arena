<!DOCTYPE html>
<html>
    <head>
        <title>CSS COLOR REFERENCES</title>
        <style>
            .color-name{
                color:red;
            }
            .hex-color{
                color:#0000FF;
            }
            .rgb-color{
                color:rgb(0,128,0);
            }
            .rgba-color{
                color:rgba(255,0,0,0.5);
            }
            .hsl-color{
                color:hsl(240,100%,50%);
            }
            .hsla-color{
                color:hsla(320, 88%, 49%, 0.7);
            }
        </style>
    </head>
    <body>
        <h2 class="color-name">Color Name</h2>
        <h2 class="hex-color">Hexadecimal Color</h2>
        <h2 class="rgb-color">RGB Color</h2>
        <h2 class="rgba-color">RGBA Color</h2>
        <h2 class="hsl-color">HSL Color</h2>
        <h2 class="hsla-color">HSLA Color</h2>

    </body>
</html>
