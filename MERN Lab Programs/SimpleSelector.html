<!Doctype html>
<html>
    <head>
        <title>Simple Selector</title>
        <style>
            /*element selector*/
            p{
                color:aqua;
            }
            /*ID selector uses "#" */
            #main{
                color:crimson;
            }
            /*Class selector uses "." */
            .note{
                color:deeppink;
            }
            /*Group selector*/
            h1,h2{
                text-align: center;
            }
            /*Universal selector uses "*" */
            *{
                font-family: Arial;
            }
        </style>
    </head>
    <body>
        <h1 id="main">CSS Selectors</h1>
        <h2>Introduction</h2>
        <p>Selector forms</p>
        <p class="note">A CSS selectors is used to select HTML elements so that we can apply styles to them</p>
    </body>
</html>
