<!DOCTYPE html>
<html>
    <head>
        <title>Fibonacci Series</title>
    </head>
    <body>
        <h2>Fibonacci of a n numbers</h2>
        <input type="number" id="num">
        <button onclick="findFibonacci()">Find</button>
        <p id="result"></p>
        <script>
            function findFibonacci(){
                let n=document.getElementById("num").value;
                let a=0;
                let b=1,c;
                let res=a+" "+b+" ";
                for(let i=2;i<n;i++){
                    c=a+b;
                    res+=c+" ";
                    a=b;
                    b=c;
                    c=a+b;
                }
                document.getElementById("result").innerHTML=res;
            }
        </script>
    </body>
</html>
