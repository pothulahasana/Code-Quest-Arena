<!DOCTYPE html>
<html>
    <head>
        <title>Printing 1 to n</title>
    </head>
    <body>
        <h3>Printing 1 to n numbers</h3>
        <script>
            var i;
            var n=parseInt(prompt("Enter a number : "));
            window.confirm("do you want to print 1 to "+n+" numbers")
            for(i=1;i<=n;i++){
                document.write(i+" ");
            }
        </script>
    </body>
</html>
