<!doctype html>
<html>
    <head>
        <title>Form</title>
    </head>
    <body>
        <center>
            <h2>Confirmation Form</h2>
            <p>Fill the form to confirm the registration </p>
            <form>
                <table>
                    <tr>
                    <td><label>Username : </label></td>
                    <td><input type="text" placeholder="enter username"></td>
                    <td><label>Email : </label></td>
                    <td><input type="email"></td>
                    </tr>

                    <tr>
                    <td><label>First Name : </label></td>
                    <td><input type="text"></td>
                    <td><label>Last Name : </label></td>
                    <td><input type="text"></td>
                    </tr>

                    <tr>
                    <td><label>Roll Number : </label></td>
                    <td><input type="text"></td>
                    <td><label>Section : </label></td>
                    <td><input type="number" min="0" max="8"></td>
                    </tr>

                    <tr>
                    <td><label>Mobile Number : </label></td>
                    <td><input type="tel"></td>
                    <td><label>dob : </label></td>
                    <td><input type="date"></td>
                    </tr>

                    <tr>
                    <td><label>Registration No : </label></td>
                    <td><input type="number"></td>
                    </tr>

                    <tr>
                    <td><label>Gender : </label></td>
                    <td><label>Girl:</label></td>
                    <td><input type="radio" name="gender"></td>
                    <td><label>Boy:</label></td>
                    <td><input type="radio" name="gender"></td>
                    </tr>

                    <tr>
                    <td><label>State : </label></td>
                    <td><input type="text"></td>
                    <td><label>City : </label></td>
                    <td><input type="text"></td>
                    </tr>

                    <tr>
                    <td><label>Dept : </label></td>
                    <td><input type="text"></td>
                    <td><label>Course : </label></td>
                    <td><input type="text"></td>
                    </tr>

                    <tr>
                    <td><label>password : </label></td>
                    <td><input type="password" placeholder="enter password"></td>
                    <td><label>Confirm Password : </label></td>
                    <td><input type="password" placeholder="confirm password"></td>    
                    </tr>
                    
                </table>
                <input type="checkbox">
                <label>i agree terms and condition</label><br>
                <button>Submit</button>
                <!-- <input type="submit" value="register now">-->
            </form>
        </center>
    </body>
</html>
